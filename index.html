                            <img alt="Modern 3D Printer" className="w-full h-full object-cover opacity-40" src="https://images.unsplash.com/photo-1631281956016-3cdc1b2fe5fb?auto=format&fit=crop&q=80&w=2000" />
                            <div className="absolute inset-0 bg-gradient-to-r from-background via-background/80 to-transparent"></div>
                        </div>
                        <div className="container mx-auto px-8 relative z-10">
                            <div className="max-w-4xl">
                                <span className="inline-block px-4 py-1 mb-6 rounded-full bg-secondary-container text-on-secondary-container text-sm font-medium tracking-wider uppercase">{t.hero.tag}</span>
                                <h1 className="font-headline text-[3.5rem] md:text-[5rem] leading-[1] font-bold tracking-tighter text-on-surface mb-6">
                                    {t.hero.title}<br />
                                    <span className="text-primary">{t.hero.subtitle}</span>
                                </h1>
                                <p className="text-xl md:text-2xl text-on-surface-variant font-light max-w-2xl mb-10 leading-relaxed">
                                    {t.hero.desc}
                                </p>
                                <div className="flex flex-col sm:flex-row gap-4">
                                    <button onClick={() => navigate('/calculator')} className="px-8 py-4 bg-primary text-on-primary rounded-lg font-bold text-lg hover:brightness-110 transition-all flex items-center justify-center gap-2 group">
                                        {t.hero.ctaQuote}
                                        <span className={`material-symbols-outlined group-hover:translate-x-1 transition-transform ${lang === 'ar' ? 'rotate-180' : ''}`}>arrow_forward</span>
                                    </button>
                                    <button onClick={() => navigate('/portfolio')} className="px-8 py-4 bg-surface-container-high text-primary rounded-lg font-bold text-lg hover:bg-surface-container-highest transition-all">
                                        {t.hero.ctaPortfolio}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section>
                </main>
            );
        };

        const CalculatorPage = () => {
            const { t } = useContext(LanguageContext);
            return (
                <main className="pt-32 pb-20">
                    <div className="container mx-auto px-8 max-w-4xl text-center">
                        <h1 className="text-4xl font-headline font-bold mb-8">{t.calc.title}</h1>
                        <p className="text-zinc-400">Calculator Component is coming soon...</p>
                    </div>
                </main>
            );
        };

        const ProductsPage = () => {
            const { t } = useContext(LanguageContext);
            return (
                <main className="pt-32 pb-20">
                    <div className="container mx-auto px-8 max-w-4xl text-center">
                        <h1 className="text-4xl font-headline font-bold mb-8">{t.store.title}</h1>
                        <p className="text-zinc-400">Products are loading...</p>
                    </div>
                </main>
            );
        };

        const ServicesPage = () => {
            const { t } = useContext(LanguageContext);
            return (
                <main className="pt-32 pb-20 text-center">
                    <h1 className="text-4xl font-headline font-bold">{t.nav.services}</h1>
                </main>
            );
        };

        const PortfolioPage = () => {
            const { t } = useContext(LanguageContext);
            return (
                <main className="pt-32 pb-20 text-center">
                    <h1 className="text-4xl font-headline font-bold">{t.portfolio.title}</h1>
                </main>
            );
        };

        const AboutPage = () => {
            const { t } = useContext(LanguageContext);
            return (
                <main className="pt-32 pb-20 text-center">
                    <h1 className="text-4xl font-headline font-bold">{t.nav.about}</h1>
                </main>
            );
        };

        const BlogPage = () => {
            const { t } = useContext(LanguageContext);
            return (
                <main className="pt-32 pb-20 text-center">
                    <h1 className="text-4xl font-headline font-bold">{t.blog.title}</h1>
                </main>
            );
        };

        const ContactPage = () => {
            const { t } = useContext(LanguageContext);
            const [formData, setFormData] = useState({ name: '', email: '', message: '' });
            const [submitted, setSubmitted] = useState(false);
            const [loading, setLoading] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                setLoading(true);

                const templateParams = {
                    from_name: formData.name,
                    from_email: formData.email,
                    message: formData.message,
                    to_name: "LayerCake 3D Admin"
                };

                // استبدل الـ IDs هنا بما تملك من موقع EmailJS
                emailjs.send(
                    'YOUR_SERVICE_ID', 
                    'YOUR_TEMPLATE_ID', 
                    templateParams,
                    'm99S7PZ9WNo4YmC81'
                )
                .then((result) => {
                    setSubmitted(true);
                    setLoading(false);
                }, (error) => {
                    alert("Error sending message. Please check IDs.");
                    setLoading(false);
                });
            };

            if (submitted) {
                return (
                    <div className="pt-40 pb-20 text-center container mx-auto px-8">
                        <div className="max-w-md mx-auto bg-surface-container p-12 rounded-2xl border border-primary/20">
                            <span className="material-symbols-outlined text-primary text-64px mb-6">check_circle</span>
                            <h2 className="text-3xl font-headline font-bold mb-4">{t.contact.success}</h2>
                            <p className="text-on-surface-variant mb-8">{t.contact.successDesc}</p>
                            <button onClick={() => setSubmitted(false)} className="text-primary font-bold hover:underline">
                                {t.contact.another}
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <main className="pt-32 pb-20">
                    <div className="container mx-auto px-8 max-w-4xl">
                        <div className="text-center mb-16">
                            <h1 className="text-5xl font-headline font-bold mb-4">{t.contact.title}</h1>
                            <p className="text-on-surface-variant text-lg">نحن هنا لمساعدتك في تحويل أفكارك إلى واقع.</p>
                        </div>
                        
                        <form onSubmit={handleSubmit} className="space-y-6 bg-surface-container p-8 rounded-2xl border border-white/5">
                            <div>
                                <label className="block text-sm font-bold mb-2 uppercase tracking-widest text-primary">{t.contact.name}</label>
                                <input 
                                    required
                                    type="text" 
                                    className="w-full bg-background border border-white/10 rounded-lg p-4 focus:border-primary outline-none transition-all"
                                    placeholder={t.contact.placeholderName}
                                    value={formData.name}
                                    onChange={(e) => setFormData({...formData, name: e.target.value})}
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-bold mb-2 uppercase tracking-widest text-primary">{t.contact.email}</label>
                                <input 
                                    required
                                    type="email" 
                                    className="w-full bg-background border border-white/10 rounded-lg p-4 focus:border-primary outline-none transition-all"
                                    placeholder={t.contact.placeholderEmail}
                                    value={formData.email}
                                    onChange={(e) => setFormData({...formData, email: e.target.value})}
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-bold mb-2 uppercase tracking-widest text-primary">{t.contact.msg}</label>
                                <textarea 
                                    required
                                    rows="5"
                                    className="w-full bg-background border border-white/10 rounded-lg p-4 focus:border-primary outline-none transition-all"
                                    placeholder={t.contact.placeholderMsg}
                                    value={formData.message}
                                    onChange={(e) => setFormData({...formData, message: e.target.value})}
                                ></textarea>
                            </div>
                            <button 
                                disabled={loading}
                                type="submit" 
                                className={`w-full py-4 bg-primary text-on-primary rounded-lg font-bold text-lg transition-all ${loading ? 'opacity-50 cursor-not-allowed' : 'hover:brightness-110'}`}
                            >
                                {loading ? 'جاري الإرسال...' : t.contact.submit}
                            </button>
                        </form>
                    </div>
                </main>
            );
        };

        const App = () => {
            const [lang, setLang] = useState('ar');
            const t = translations[lang];

            useEffect(() => {
                document.dir = lang === 'ar' ? 'rtl' : 'ltr';
                document.documentElement.lang = lang;
            }, [lang]);

            const ScrollToTop = () => {
                const { pathname } = useLocation();
                useEffect(() => { window.scrollTo(0, 0); }, [pathname]);
                return null;
            };

            return (
                <LanguageContext.Provider value={{ lang, setLang, t }}>
                    <MemoryRouter>
                        <ScrollToTop />
                        <Navbar />
                        <Routes>
                            <Route path="/" element={<HomePage />} />
                            <Route path="/calculator" element={<CalculatorPage />} />
                            <Route path="/products" element={<ProductsPage />} /> 
                            <Route path="/blog" element={<BlogPage />} />
                            <Route path="/services" element={<ServicesPage />} />
                            <Route path="/portfolio" element={<PortfolioPage />} />
                            <Route path="/about" element={<AboutPage />} />
                            <Route path="/contact" element={<ContactPage />} />
                        </Routes>
                        <Footer />
                    </MemoryRouter>
                </LanguageContext.Provider>
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
