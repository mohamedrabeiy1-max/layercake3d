            const { t } = useContext(LanguageContext);

            const [color, setColor] = React.useState('Black');
            const [quantity, setQuantity] = React.useState(1);
            const [file, setFile] = React.useState(null);
            const [uploading, setUploading] = React.useState(false);
            const [totalPrice, setTotalPrice] = React.useState(0);
            const [volume, setVolume] = React.useState(0); 
            const [weight, setWeight] = React.useState(0); 
            const fileInputRef = React.useRef(null);

            const CLOUD_NAME = "dq8eyh6oc"; 
            const UPLOAD_PRESET = "pvo5r7zi"; 

            const materialProfiles = {
                'PLA+': { density: 1.24, pricePerGram: 3.03 }, 
                'PETG': { density: 1.27, pricePerGram: 5.03 }, 
                'TPU':  { density: 1.21, pricePerGram: 6.03 }  
            };

            const colors = [
                'Black', 'White', 'Grey', 'Silver', 'Gold', 'Copper', 
                'Red', 'Crimson', 'Blue', 'Navy Blue', 'Cyan', 'Green', 
                'Lime Green', 'Yellow', 'Orange', 'Purple', 'Pink', 
                'Brown', 'Transparent', 'Glow in the Dark'
            ];

            const calculateSTLVolume = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const loader = new THREE.STLLoader();
                            const geometry = loader.parse(e.target.result);
                            let v = 0;
                            const pos = geometry.attributes.position;
                            for (let i = 0; i < pos.count; i += 3) {
                                const v1 = new THREE.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i));
                                const v2 = new THREE.Vector3(pos.getX(i+1), pos.getY(i+1), pos.getZ(i+1));
                                const v3 = new THREE.Vector3(pos.getX(i+2), pos.getY(i+2), pos.getZ(i+2));
                                v += (v1.x * v2.y * v3.z + v1.y * v2.z * v3.x + v1.z * v2.x * v3.y - 
                                      v1.x * v2.z * v3.y - v1.y * v2.x * v3.z - v1.z * v2.y * v3.x) / 6;
                            }
                            resolve(Math.abs(v));
                        } catch (err) { resolve(0); }
                    };
                    reader.readAsArrayBuffer(file);
                });
            };

            const handleFileSelect = async (e) => {
                const selectedFile = e.target.files[0];
                if (selectedFile) {
                    setFile(selectedFile);
                    const calculatedVolume = await calculateSTLVolume(selectedFile);
                    setVolume(calculatedVolume);
                }
            };

            React.useEffect(() => {
                if (volume > 0) {
                    const volumeInCm3 = volume / 1000;
                    const profile = materialProfiles[material];
                    let calculatedWeight = volumeInCm3 * profile.density * (infill / 100);
                    if (hasSupports) calculatedWeight *= 1.125;
                    const finalWeight = parseFloat(calculatedWeight.toFixed(2));
                    setWeight(finalWeight);
                    let layerExtra = 0;
                    if (layerHeight === 0.16) layerExtra = 1;
                    if (layerHeight === 0.12) layerExtra = 2;
                    const finalPricePerGram = profile.pricePerGram + layerExtra;
                    const calculatedTotal = (finalWeight * finalPricePerGram) * quantity;
                    setTotalPrice(calculatedTotal.toFixed(2));
                } else {
                    setTotalPrice(0);
                    setWeight(0);
                }
            }, [infill, material, layerHeight, hasSupports, quantity, volume]);

            const handleWhatsAppOrder = async () => {
                let fileLink = "No file uploaded";

                    setUploading(true);
                    const formData = new FormData();
                    formData.append('file', file);

                                `*🎨 Color:* ${color}%0A` +
                                `*🔍 Resolution:* ${layerHeight}mm%0A` +
                                `*🏁 Infill:* ${infill}%%0A` +
                                `*🔢 Quantity:* ${quantity}%0A` +
                                `--------------------------%0A` +
                                `*💰 Total Price:* ${totalPrice} EGP`;

            };

                    <button onClick={() => { setCurrentPage(prev => Math.min(prev + 1, totalPages)); window.scrollTo(0,0); }} disabled={currentPage === totalPages} className={`px-6 py-3 rounded-xl font-bold ${currentPage === totalPages ? 'bg-zinc-800 text-zinc-600' : 'bg-white text-black hover:bg-blue-500 hover:text-white transition-colors'}`}>{t.store.next}</button>
                </div>
            )}
            
            {selectedImg && (
                <div className="fixed inset-0 z-[9999] bg-black/95 backdrop-blur-xl flex items-center justify-center p-4" onClick={() => setSelectedImg(null)}>
                    <span className="absolute top-10 right-10 text-white text-6xl cursor-pointer hover:text-red-500">×</span>
                    <img src={selectedImg} className="max-w-[95%] max-h-[90vh] object-contain rounded-2xl shadow-2xl" alt="Zoomed" />
                </div>
            )}
            {filteredProducts.length === 0 && <div className="text-center py-40 text-zinc-700 text-2xl italic">{t.store.noMatches}</div>}
        </main>
    );
};
