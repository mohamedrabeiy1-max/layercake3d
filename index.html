        'PETG': { density: 1.27, pricePerGram: 5.03 }, 
        'TPU':  { density: 1.21, pricePerGram: 6.03 }  
    };

    const colors = [
        'Black', 'White', 'Grey', 'Silver', 'Gold', 'Copper', 
        'Red', 'Crimson', 'Blue', 'Navy Blue', 'Cyan', 'Green', 
        'Lime Green', 'Yellow', 'Orange', 'Purple', 'Pink', 
        'Brown', 'Transparent', 'Glow in the Dark'
    ];

    const calculateSTLVolume = (file) => {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const loader = new THREE.STLLoader();
                    const geometry = loader.parse(e.target.result);
                    let v = 0;
                    const pos = geometry.attributes.position;
                    for (let i = 0; i < pos.count; i += 3) {
                        const v1 = new THREE.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i));
                        const v2 = new THREE.Vector3(pos.getX(i+1), pos.getY(i+1), pos.getZ(i+1));
                        const v3 = new THREE.Vector3(pos.getX(i+2), pos.getY(i+2), pos.getZ(i+2));
                        v += (v1.x * v2.y * v3.z + v1.y * v2.z * v3.x + v1.z * v2.x * v3.y - 
                              v1.x * v2.z * v3.y - v1.y * v2.x * v3.z - v1.z * v2.y * v3.x) / 6;
                    }
                    resolve(Math.abs(v));
                } catch (err) { resolve(0); }
            };
            reader.readAsArrayBuffer(file);
        });
    };

    const handleFileSelect = async (e) => {
        const selectedFile = e.target.files[0];

            if (layerHeight === 0.12) layerExtra = 2;

            const finalPricePerGram = profile.pricePerGram + layerExtra;

        { id: 1, name: "Tsunami Headphone Stand", price: 540, image: "https://i.postimg.cc/cJ6PVpTk/Tsunami-Headphone-Stand-(5).png" },
        { id: 2, name: "Controller Stand V3", price: 380, image: "https://i.ibb.co/G4Vy1qVR/20241014-005119.png" },
        { id: 3, name: "Controller Stand V2", price: 530, image: "https://i.ibb.co/7JnXkQ8C/20241029-101438.png" },
        { id: 4, name: "Universal Controller Stand", price: 550, image: "https://i.ibb.co/Nd26bX15/20241104-101830.png" },
        { id: 6, name: "Brachial Plexus Model", price: 1700, image: "https://i.ibb.co/Gv5ZHvy3/2.png" },
        { id: 7, name: "Anatomical Spine Model", price: 1600, image: "https://i.ibb.co/XxDVkLFw/3.png" },
        { id: 8, name: "Anatomical Hand Model", price: 500, image: "https://i.ibb.co/NgbNXHn0/4.png" },
        { id: 12, name: "Book-Shaped Storage Box", price: 1300, image: "https://i.ibb.co/B5r3Gnw0/03.webp" },
        { id: 13, name: "Bunny Chocolate Holder", price: 140, image: "https://i.ibb.co/SwjRCpZk/1a-3a-20260314-093308.webp" },
        { id: 15, name: "Scrolling Room Sign", price: 45, image: "https://i.ibb.co/Zp97sHDC/1772643249453.webp" },
        { id: 16, name: "Car Rim Keychain", price: 30, image: "https://i.ibb.co/v4dBnzxv/5298962107158174565.webp" },
        { id: 17, name: "Pluto Dog Figure", price: 200, image: "https://i.ibb.co/k69pb4J7/IMG-4269.jpg" },
        { id: 19, name: "Baby Mickey Mouse", price: 100, image: "https://i.ibb.co/sJ6KhfBy/2025-06-04-750b7254cba56.webp" },
        { id: 20, name: "Donald Duck Figure", price: 220, image: "https://i.ibb.co/ycVtLQbw/IMG-4416.jpg" },
        { id: 21, name: "Scrooge McDuck", price: 400, image: "https://i.ibb.co/RpYPkpC8/IMG-4416.jpg" },
        { id: 26, name: "Wall Shelf", price: 630, image: "https://i.ibb.co/wNnQYCwm/downlo312312312311ad.jpg" },
        { id: 27, name: "Incense Holder & Ashtray", price: 250, image: "https://i.ibb.co/7NChXL9D/Chat-GPT-Image-2026-ma-rc-15-08-25-33.png" },
        { id: 28, name: "Spider-Man Figure", price: 660, image: "https://i.ibb.co/mVbxWf8J/20260316-012908.jpg" },
        { id: 22, name: "Taz Figure", price: 750, image: "https://i.ibb.co/5gd7RyfS/20250707-124607.jpg" },
        { id: 23, name: "Pillow Phone Stand", price: 900, image: "https://i.ibb.co/JRQH3Lnq/Pillow-Phone-Stand1.png" },
        { id: 24, name: "Drill Dust Collector", price: 120, image: "https://i.ibb.co/bgcDBZn9/20241202-183345.png" },
        { id: 25, name: "Racing Seat Phone Stand", price: 250, image: "https://i.ibb.co/qY8LxPq8/Support-tel-baquet-1.png" },
        { id: 18, name: "Minnie Mouse Figure", price: 290, image: "https://i.ibb.co/0VXBTk1v/IMG-3655.jpg" },
        { 
            id: 14, 
            name: "Pencil Holder", 
            price: 330, 
            images: [
                "https://i.ibb.co/JwZgsY7C/img-20260223-204748.webp",
                "https://i.ibb.co/Cs46sMn7/game-over269.webp",
                "https://i.ibb.co/JjGpMzGT/1.webp",
                "https://i.ibb.co/zWLycXP4/Whisk-63ff86e7fb535b8b2f74a3e13eaf47e7dr.png"
            ],
            currentImg: 0 
        }
    ]);

    // 2. States
    const [searchTerm, setSearchTerm] = React.useState("");
    const [selectedImg, setSelectedImg] = React.useState(null);
    const [currentPage, setCurrentPage] = React.useState(1);
    const productsPerPage = 12;

    // 3. Search & Pagination Logic
    const filteredProducts = products.filter(p => 
        p.name.toLowerCase().includes(searchTerm.toLowerCase())
    );

    const indexOfLastProduct = currentPage * productsPerPage;
    const indexOfFirstProduct = indexOfLastProduct - productsPerPage;
    
    // Show ALL if searching, otherwise Paginate
    const currentProducts = searchTerm 
        ? filteredProducts 
        : filteredProducts.slice(indexOfFirstProduct, indexOfLastProduct);

    const totalPages = Math.ceil(filteredProducts.length / productsPerPage);

    const changeImg = (productId, direction, e) => {
        e.stopPropagation();
        setProducts(prev => prev.map(p => {
            if (p.id === productId && p.images) {
                const nextIndex = (p.currentImg + direction + p.images.length) % p.images.length;
                return { ...p, currentImg: nextIndex };
            }
            return p;
        }));
    };

    return (
        <main className="min-h-screen bg-black text-white p-6 md:p-12">
            {/* Search Section */}
            <div className="max-w-xl mx-auto mb-16 text-center">
                <h1 className="text-4xl font-bold mb-8 italic tracking-widest text-blue-500">STORE</h1>
                <div className="relative group">
                    <input 
                        type="text"
                        placeholder="Search for products..."
                        className="w-full bg-zinc-900 border border-zinc-800 rounded-2xl py-4 px-6 outline-none focus:border-blue-500 transition-all text-lg"
                        value={searchTerm}
                        onChange={(e) => {
                            setSearchTerm(e.target.value);
                            setCurrentPage(1); // Reset to page 1 on search
                        }}
                    />
                </div>
            </div>
            
            {/* Products Grid */}
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 max-w-[1600px] mx-auto">
                {currentProducts.map(p => (
                    <div key={p.id} className="bg-zinc-900/40 rounded-[2.5rem] p-5 border border-zinc-800/50 flex flex-col hover:border-blue-500/50 transition-all duration-300">
                        <div 
                            className="relative aspect-square mb-5 overflow-hidden rounded-3xl bg-zinc-950 cursor-zoom-in group"
                            onClick={() => setSelectedImg(p.images ? p.images[p.currentImg || 0] : p.image)}
                        >
                            <img 
                                src={p.images ? p.images[p.currentImg || 0] : p.image} 
                                className="w-full h-full object-contain p-4 transition-transform duration-500 group-hover:scale-110" 
                                alt={p.name}
                            />
                            {p.images && (
                                <div className="absolute inset-0 flex items-center justify-between px-3">
                                    <button onClick={(e) => changeImg(p.id, -1, e)} className="w-10 h-10 bg-black/60 backdrop-blur-md rounded-full flex items-center justify-center text-2xl hover:bg-blue-600 transition-colors">‹</button>
                                    <button onClick={(e) => changeImg(p.id, 1, e)} className="w-10 h-10 bg-black/60 backdrop-blur-md rounded-full flex items-center justify-center text-2xl hover:bg-blue-600 transition-colors">›</button>
                                </div>
                            )}
                        </div>

                        <h3 className="font-bold text-xl mb-1 px-2 truncate">{p.name}</h3>
                        <p className="text-blue-400 font-black text-lg px-2 mb-6">{p.price} EGP</p>
                        
                        <button 
                            onClick={() => window.open(`https://wa.me/201050040993?text=Order: ${p.name}`, '_blank')}
                            className="w-full py-4 bg-green-600 hover:bg-green-500 text-white rounded-2xl font-bold transition-all mt-auto flex items-center justify-center gap-2"
                        >
                            Order on WhatsApp
                        </button>
                    </div>
                ))}
            </div>

            {/* Pagination - Only shown when not searching */}
            {!searchTerm && totalPages > 1 && (
                <div className="mt-20 flex justify-center items-center gap-4">
                    <button 
                        onClick={() => { setCurrentPage(prev => Math.max(prev - 1, 1)); window.scrollTo(0,0); }}
                        disabled={currentPage === 1}
                        className={`px-6 py-3 rounded-xl font-bold ${currentPage === 1 ? 'bg-zinc-800 text-zinc-600' : 'bg-white text-black hover:bg-blue-500 hover:text-white transition-colors'}`}
                    >
                        Prev
                    </button>
                    <span className="text-zinc-500 font-bold">Page {currentPage} of {totalPages}</span>
                    <button 
                        onClick={() => { setCurrentPage(prev => Math.min(prev + 1, totalPages)); window.scrollTo(0,0); }}
                        disabled={currentPage === totalPages}
                        className={`px-6 py-3 rounded-xl font-bold ${currentPage === totalPages ? 'bg-zinc-800 text-zinc-600' : 'bg-white text-black hover:bg-blue-500 hover:text-white transition-colors'}`}
                    >
                        Next
                    </button>
                </div>
            )}

            {/* Modal Image Zoom */}
            {selectedImg && (
                <div 
                    className="fixed inset-0 z-[9999] bg-black/95 backdrop-blur-xl flex items-center justify-center p-4 animate-in fade-in duration-200"
                    onClick={() => setSelectedImg(null)}
                >
                    <span className="absolute top-10 right-10 text-white text-6xl cursor-pointer hover:text-red-500">×</span>
                    <img 
                        src={selectedImg} 
                        className="max-w-[95%] max-h-[90vh] object-contain rounded-2xl shadow-2xl animate-in zoom-in duration-300"
                        alt="Zoomed"
                    />
                </div>
            )}

            {filteredProducts.length === 0 && (
                <div className="text-center py-40 text-zinc-700 text-2xl italic">No matches found for your search.</div>
            )}
        </main>
    );
};
    const App = () => {
            const ScrollToTop = () => {
                const { pathname } = useLocation();
                useEffect(() => { window.scrollTo(0, 0); }, [pathname]);
                return null;
            };

            return (
                <MemoryRouter>
                    <ScrollToTop />
                    <Navbar />
<Routes>
    <Route path="/" element={<HomePage />} />
    <Route path="/calculator" element={<CalculatorPage />} />
    <Route path="/products" element={<ProductsPage />} /> 
    <Route path="/services" element={<ServicesPage />} />
    <Route path="/portfolio" element={<PortfolioPage />} />
    <Route path="/about" element={<AboutPage />} />
    <Route path="/contact" element={<ContactPage />} />
</Routes>
                    <Footer />
                </MemoryRouter>
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
